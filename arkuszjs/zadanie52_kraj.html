<html lang="pl">
  <head>
    <meta charset="utf-8">
    <title> Przykład użycia pętli </title>
    <script language="JavaScript">
        document.write(`<p style="color: red; font-size: 40px;">Krajkowski</p>`);
        document.write(`<p style="color: blue; font-size: 20px;">Wyprowadzenie licz od q do 10 przesunietych o dejna spacje w prawo. demonstracje petli zagniezdzonych (czyli petla w petli)</p>`);
      for (var i = 1; i <= 10; i++) {
        for (var k = 1; k <= i; k++) {
          document.write("&nbsp");
        }
        document.write(i + " <br> ");
        }
    </script>
  </head>
  <body></body>
</html>
