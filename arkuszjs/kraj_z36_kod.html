    <body>
        <script>
            let x=prompt("podaj liczbę x=","");
            let a_dana_kraj=parseFloat(x);

            if(a_dana_kraj%2==0) {
                document.write("czytana liczba x="+a_dana_kraj+"<br>");
                document.write("<h3 style=\"color:red;\">czytana liczba jest parzysta</h3>"+"<br>");
            }else {
                document.write("czytana liczba x="+a_dana_kraj+"<br>");
                document.write("<h5 style=\"color:silver;\">czytana liczba jest nieparzysta</h5>"+"<br>");
            }
        </script>
    </body>
</html>
