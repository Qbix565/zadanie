<!DOCTYPE html>
<html>
    <head>
        <title>zadanie29-krajkowski</title>
    </head>
    <body>
        <p><b>1. W jaki sposób można określić właściwość danego obiektu?</b></p>
        <div>
            <p><b>Sposob 1:</b> nazwa_obiektu.nazwa_wlasciwosci="tekst";</p>
            <p>np. auto.marka="Opel Omega";</p>
            <p><b>Sposob 2:</b> nazwa_obiektu[nazwa_wlasciwosci];</p>
            <p>np. auto[cena]=25000;</p>
        </div>
        
        <p><b>2. W jaki sposób można odwołać się do pól (właściwości) i metod?</b></p>
        <div>
            <p>Do wlasciwosci i metod mozna sie odwolac podobnie jak do zwyklych zmiennych</p>
            <p>i funkcji, trzeba tylko przed ich nazwa umiescic nazwe obiektu i kropke.</p>
            <p>np. console.log(samochod1.kolor);</p>
        </div>

        <p><b>3. Wymień cechy charakterystyczne konstruktora.</b></p>
        <div>
            <ul>
                <li>jest wywolywany automatycznie w chwili tworzenia obiektu</li>
                <li>nazywa sie tak samo jak klasa</li>
                <li>nie zwraca zadnej wartosci</li>
                <li>moze przyjmowac argumenty</li>
            </ul>
        </div>

        <p><b>4. Konstruowanie obiektu - obiekt ma trzy pola oraz jedną metodę.</b></p>
        <script>
            var osoba_1 = {
                nazwisko : 'Kowalski',
                imie :'Jan',
                zawod: 'kierowca',
                wypisz: function() {
                    document.write(this.nazwisko + ' ' + this.imie + ' ' + this.zawod);
                }
            };
        </script>

        <p><b>5. Znaczenie słowa this.</b></p>
        <p>slowo kluczowe <b>this</b> pozwala odwolac sie do pola lub metody obiektu z wnetrza tego obiektu.</p>

        <p><b>6. Konstruktor w JS</b></p>
        <script>
            function klient(nazwisko_k, imie_k, zawod_k) {
                this.nazwisko = nazwisko_k;
                this.imie = imie_k;
                this.zawod = zawod_k;
            }
            klient.prototype.wypisz = function() {
                alert(this.nazwisko + ' ' + this.imie + ' ' + this.zawod);
            };
        </script>

        <p><b>7. Znaczenie słowa kluczowego New.</b></p>
        <p>do utworzenia nowego obiektu na podstawie konstruktora:</p>
        <p>var osoba1 = new klient('Kowalski', 'Jan', 'kierowca');</p>

        <p><b>8. Znaczenie słowa kluczowego prototype.</b></p>
        <p>Do definiowania metod i wlasciwosci dla obiektu:</p>
        <script>
            klient.prototype.pisz_dane = function() {
                document.write(this.nazwisko + ' ' + this.imie);
            };
        </script>
    </body>
</html>
