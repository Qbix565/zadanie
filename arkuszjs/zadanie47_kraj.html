    <!-- // Nazwisko: krajkowski (10 liter), imię: jakub (5 liter)
    // Ilość wyświetleń: (10 mod 4) + 10 = 2 + 10 = 12
    // Wielkość liter: (10 mod 3) + 40 = 1 + 40 = 41px -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script>
        document.write(`<p>Ilosc wykonania petli = 12</p>`);
        document.write(`<p>Wielkosc liter = 41px</p>`);
        let kra_liczba=parseFloat(prompt(`Podaj liczbe:`));
        if(kra_liczba%2==0){
            for(let i_k=1;i_k<=12;i_k++){
                document.write(`<span style="color:blue; font-size:41px;">Krajkowski</span><br>`);
            }
        }else{
            for(let i_k=1;i_k<=12;i_k++){
                document.write(`<span style="color:blue; font-size:41px;">Jakub</span><br>`);
            }
        }
    </script>
</body>
</html>
