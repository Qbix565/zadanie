<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>z50_krajkowski</title>
</head>
<body>
    <script style="color: red; font-size: 50px;">
        let suma_kra = 0;
        let i_kra = 1;

        do {
            suma_kra = suma_kra +1/i_kra;
            i_kra++;
        } while (i_kra<1000000);
        document.write(`wartosc sumy = ${suma_kra.toFixed(2)}`);
    </script>
</body>
</html>
