<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script>
        let kra_koniec=parseFloat(prompt("Podaj liczbe na ktorej skonczy sie petla:"));
        for(let i_k=2;i_k<=kra_koniec;i_k+=2)
        {
            document.write(`parzysta liczba to ${i_k} <br>`);
        }
    </script>
</body>
</html>
