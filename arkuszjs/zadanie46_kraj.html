<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script>
        // Krajkowski (10 liter)
        // ile_razy_wyswietlic_kra = (10 % 4) + 10 = 2 + 10 = 12
        // wielkosc_liter_kra = (10 % 3) + 40 = 1 + 40 = 41px
        let ile_razy_wyswietlic_kra = 12;
        let wielkosc_liter_kra = 41;
        for(let i=1; i<=ile_razy_wyswietlic_kra; i++){
            if(i%2==1){
                document.write('<span style="font-size:'+wielkosc_liter_kra+'px; color:blue;">Krajkowski</span><br>');
            }else{
                document.write('<span style="font-size:'+wielkosc_liter_kra+'px; color:green;">Jakub</span><br>');
            }
        }
    </script>
</body>
</html>
