<html lang="pl-PL">  
<title>Z40 Krajkowski</title>
<body> 
 <div style="color:red;font-size:50px;"> 
    <script language="JavaScript"> 
  var x=prompt("podaj argument x=",""); 
               var x_kra=parseFloat(x); 
    document.write("Wykonal Jakub Krajkowski<br>");
    document.write("czytany argument x="+x_kra+"<br>");     
 
                 function f_kra(x_kra) { 
                            if(x_kra>2) {return 9;} 
                            if((x_kra>=-2)&&(x_kra<=0)) {return (x_kra+1)*(x_kra+1);}
                            if((x_kra>0)&&(x_kra<=2)) {return (x_kra * x_kra * x_kra)+1;}
                            if(x_kra<= -2) {return 1;} 
                  } 
               document.write("f="+f_kra(x_kra)+"<br>"); 
 
           </script> 
 </div> 
 </body>
