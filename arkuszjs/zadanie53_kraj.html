<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script>
        let ile_kra=parseFloat(prompt("Podaj liczbe:"));
        let ini_kra=(prompt(`Podaj swoje inicjaly:`));

        for(let i_kra=1;i_kra<=ile_kra;i_kra++){
            for(let k_kra=1;k_kra<=i_kra;k_kra++){
                document.write("&nbsp;&nbsp;&nbsp;&nbsp;");
            }
            document.write(`${ini_kra} <br>`);
        }
    </script>
</body>
</html>
