        <p><b>1. Rodzaje filozofii programowania</b></p>
        <p>-Programowanie strukturalne</p>
        <p>-programowanie obiektowe</p>

        <p><b>2. Opisz paradygmat programowania strukturalnego</b></p>
        <p>
            paradygmat programowania opierający się na podziale kodu <br>
            źródłowego programu na procedury i hierarchicznie ułożone bloki z wykorzystaniem struktur <br>
            kontrolnych w postaci instrukcji wyboru i pętli.  <br>
        </p>

        <p><b>3. Programowanie obiektowe: definicja</b></p>
        <div>
            <p>Programowanie obiektowe(object-oriented programming) - sposob programowania, w ktorym programy definiuje sie za pomoca</p>
            <p><u>Programowanie obiektowe definicja: </u></p>
            <ul>
                <li><b>obiektow</b> (obiekty powoływane są do życia wirtualnego przez programistę, mogą być kasowane <br>
                przez programistę) np. okienka w Windowsokienko jest obiektem,  </li>
                <li>obiekt ma jakis <b>stan</b>  (czyli dane, w programowaniu obiektowym nazywane najczęściej <b>polami</b>) np. <br> 
                wielość okienka w Windows, </li>
                <li>obiekt wykazuje pewne <b>zachowanie</b> (czyli posiada pewne procedury w programowaniu <br> 
                obiektowym nazywane metody). Np. jest zdefiniowana metoda do zmiany wielkości okienka.</li>
            </ul>
        </div>

        <p><b>4. Dlaczego stosujemy programowanie obiektowe</b></p>
        <div>
            <ul>
                <li>Jest to bardziej naturalne podejście przez programistę podczas tworzenia programów</li>
                <li>Programowanie obiektowe pozwala na lepsze gospodarowanie pamięciom komputera</li>
                <li>W programowaniu obiektowym dobrze napisana i przetestowana klasa pozwala na stosowaniu 
przez innych programistów.</li>
            </ul>
        </div>
        
        <p><b>5. Omow nastepujace pojecia</b></p>
        <ul>
            <li>Klasa - rodzaj foremki, która opisuje jak będą wyglądać tworzone obiekty</li>
            <li>Obiekt - Instancja która powstała na podstawie klasy</li>
            <li>Wlasciwosci - Wlasnosci obiektu np. kolor</li>
            <li>Metoda - Zdolność którą umie wykonywać obiekt</li>
            <li>Konstruktor - Metoda wywoływana w momencie inicjalizacji obiektu</li>
            <li>Dziedziczenie - Klasa może dziedziczyć własności od innej klasy</li>
            <li>hermetyzacja - Ukrywanie pól i metod przed zewnętrznym światem</li>
            <li>Polimorfizm - wielopostaciowość obiektu</li>
        </ul>
