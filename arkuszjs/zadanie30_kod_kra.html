<!DOCTYPE html>
<html>
    <head>
        <title>zadanie30_kod_krajkowski</title>
    </head>
    <body>
        <textarea name="kod" id="kod" cols="120" rows="52">
<html>
    <head>
        <title>zadanie30-krajkowski</title>
        <script type="text/javascript">
            function spodnie(rodzaj_s, rozmiar_s, kolor_s, cena_s) {
                this.rodzaj = rodzaj_s;
                this.rozmiar = rozmiar_s;
                this.kolor = kolor_s;
                this.cena = cena_s;
            }
            
            spodnie.prototype.spodnie_wyswietl_krajkowski = function() {
                document.write("<p>Rodzaj: " + this.rodzaj + "</p>");
                document.write("<p>Rozmiar: " + this.rozmiar + "</p>");
                document.write("<p>Kolor: " + this.kolor + "</p>");
                document.write("<p>Cena: " + this.cena + " PLN</p>");
                document.write("<hr>");
            };
            
            spodnie.prototype.zmienCene = function(nowaCena) {
                this.cena = nowaCena;
                alert("Cena zmieniona na: " + this.cena + " PLN");
            };
            
            var spodnie1 = new spodnie("Jeans", "32", "Niebieski", 150);
            var spodnie2 = new spodnie("Materiałowe", "L", "Czarny", 200);
            var spodnie3 = new spodnie("Sportowe", "M", "Szary", 120);
        </script>
    </head>
    <body>
        <h2>Zadanie 30 - Krajkowski Programowanie obiektowe - Spodnie</h2>
        
        <script type="text/javascript">
            document.write("<h3>Lista spodni:</h3>");
            spodnie1.spodnie_wyswietl_krajkowski();
            spodnie2.spodnie_wyswietl_krajkowski();
            spodnie3.spodnie_wyswietl_krajkowski();
            
            document.write("<h3>Dostęp do właściwości obiektu:</h3>");
            document.write("<p>Pierwsze spodnie: " + spodnie1.rodzaj + " rozmiar: " + spodnie1.rozmiar + ", kolor: " + spodnie1.kolor + "</p>");
            document.write("<p>Drugie spodnie: " + spodnie2.rodzaj + " " + spodnie2.kolor + ", cena: " + spodnie2.cena + " PLN</p>");
            
            document.write("<h3>Zmiana ceny spodni:</h3>");
            document.write("<p>Cena spodnie3 przed zmianą: " + spodnie3.cena + " PLN</p>");
            spodnie3.zmienCene(140);
            document.write("<p>Cena spodnie3 po zmianie: " + spodnie3.cena + " PLN</p>");
        </script>
    </body>
</html>
