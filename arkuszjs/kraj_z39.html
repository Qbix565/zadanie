<!DOCTYPE html>
<html>
<head>
    <title>Krajkowski Z39_JS</title>
</head>
<body>
    <h1 style="color: green;">MENU</h1>
    <h3 style="color: red;">CZERWONY</h3>
    <h3 style="color: blue;">NIEBIESKI</h3>

    <input type="button" name="Krajkowski" value="Oblicz" onclick="fun_kra()" />
<script>
function fun_kra() {
var x_kra = prompt("Podaj kolor", "");
if(x_kra == 1 || x_kra.toLowerCase() == "czerwony") {
document.write('<h1 style="color: red; font-size: 17px;">wczytales kolor czerwony</h1><br />'); }
else if(x_kra == 2 || x_kra.toLowerCase() == "niebieski") {
document.write('<h6 style="color: blue; font-size: 11px;">wczytales kolor niebieski</h6><br />');
}
}
</script>
    
    
</body>
</html>
