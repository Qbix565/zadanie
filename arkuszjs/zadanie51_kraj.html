<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>zadanie51_krajkowski</title>
</head>
<body>
    <script>
        let n_kra=parseFloat(prompt(`Podaj liczbe:`));
        let silnia_kra;

        if(n_kra==0 || n_kra==1){
            silnia_kra=1;
            n_kra=1;
        }
        for(let i_kra=1;i_kra<=n_kra;i_kra++){
            if(i_kra==1){
                silnia_kra=1;
            }else{
                silnia_kra=silnia_kra*i_kra;
            }
        }
        document.write(`Silnia z ${n_kra} = ${silnia_kra}`);
    </script>
</body>
