<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Quiz OOP</title>

<style>
body{
font-family: Arial;
background:#f3f5f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

#quiz{
background:white;
padding:30px;
border-radius:12px;
width:800px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

#counter{
font-size:14px;
color:#666;
margin-bottom:10px;
}

#question{
font-size:22px;
margin-bottom:15px;
}

.option{
padding:12px;
margin:8px 0;
border:2px solid #ccc;
border-radius:8px;
cursor:pointer;
line-height:1.4;
}

.option:hover{
background:#f0f0f0;
}

.correct{
border-color:green;
background:#d4f7d4;
}

.wrong{
border-color:red;
background:#ffd6d6;
}

button{
margin-top:20px;
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:disabled{
background:#aaa;
}
</style>

</head>
<body>

<div id="quiz">

<div id="counter"></div>

<h2 id="question"></h2>

<div id="answers"></div>

<button id="nextBtn" disabled>Następne pytanie</button>

</div>

<script>

const words = [

["Polimorfizm", "Wielopostaciowość – ta sama metoda działa inaczej w różnych klasach."],
["Słowo \"this\"", "Wskazuje na bieżący obiekt (instancję), w kontekście którego wywołano kod."],
["Tworzenie obiektów", "Za pomocą operatora new (z klasą/konstruktorem) lub zapisu literalnego {}."],
["Metoda to", "Funkcja zdefiniowana wewnątrz klasy lub obiektu."],
["Hermetyzacja", "Ukrywanie wnętrza obiektu i udostępnianie tylko niezbędnego interfejsu (metod)."],
["Paradygmaty", "Obiektowe, strukturalne, funkcyjne."],
["Cechy obiektu", "Posiada stan (pola/właściwości) i zachowanie (metody)."],
["Klasa", "Szablon (wzorzec), na podstawie którego tworzone są obiekty."],
["Przypisanie wartości", "obiekt.pole = \"tekst\";"],
["Konstruktor", "Metoda wywoływana automatycznie przy tworzeniu obiektu (słowo new), inicjalizuje pola."],
["Właściwości zapisywane w", "Polach (atrybutach) obiektu."],
["Programowanie strukturalne", "Opiera się na funkcjach i hierarchicznym podziale kodu (brak goto)."],
["Zdefiniowane klasy mogą", "Dziedziczyć po innych klasach (extends) i tworzyć wiele instancji."],
["Stwierdzenie o OOP", "Łączy dane i logikę w jedną całość (obiekt)."],
["Destruktor", "Metoda usuwająca obiekt (w JS proces ten wykonuje automatycznie Garbage Collector)."],
["Wyświetlanie obiektu", "console.log(nazwaObiektu);"],
["Linia kodu", "Wywołuje metodę moze_jednak obiektu niewiem i przypisuje wynik do a_kuku."],
["Prototype", "Służy do dodawania metod i właściwości do wszystkich instancji danej klasy."],
["Ile metod/pól", "Pola to zmienne (np. this.x), metody to funkcje (np. oblicz())."],
["Dziedziczenie", "Przejmowanie właściwości i metod klasy nadrzędnej (bazowej) przez klasę pochodną."]

];

let current = 0;
let score = 0;

const question = document.getElementById("question");
const answers = document.getElementById("answers");
const nextBtn = document.getElementById("nextBtn");
const counter = document.getElementById("counter");

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

function loadQuestion(){

answers.innerHTML="";
nextBtn.disabled=true;

let word = words[current];

counter.textContent = "Pytanie " + (current+1) + " / " + words.length;

question.textContent="Co oznacza: " + word[0] + " ?";

let options=[word[1]];

while(options.length<4){
let rand = words[Math.floor(Math.random()*words.length)][1];
if(!options.includes(rand)){
options.push(rand);
}
}

options = shuffle(options);

options.forEach(opt=>{

let div=document.createElement("div");
div.textContent=opt;
div.className="option";

div.onclick=()=>{

let all=document.querySelectorAll(".option");
all.forEach(o=>o.onclick=null);

if(opt===word[1]){
div.classList.add("correct");
score++;
}else{
div.classList.add("wrong");

all.forEach(o=>{
if(o.textContent===word[1]){
o.classList.add("correct");
}
});
}

nextBtn.disabled=false;

};

answers.appendChild(div);

});

}

nextBtn.onclick=()=>{

current++;

if(current>=words.length){

counter.textContent="";

question.textContent="Koniec quizu 🎉";

answers.innerHTML="<h3>Twój wynik: "+score+" / "+words.length+"</h3>";

nextBtn.style.display="none";

return;
}

loadQuestion();

}

loadQuestion();

</script>

</body>
</html>
