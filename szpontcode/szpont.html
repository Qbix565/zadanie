<html>

<body>
    <script>
        // let a = parseFloat(prompt(`a= `));
        // let b = parseFloat(prompt(`b= `));

        let a = 6;
        let b = 5;
        function szpont() {
            let dodawanie = a + b;
            let odejmowanie = a - b;
            let mnozenie = a * b;
            let dzielenie = a / b;
            document.write(`dodawanie= ${dodawanie}<br>`);
            document.write(`odejmowanie= ${odejmowanie}<br>`);
            document.write(`mnozenie= ${mnozenie}<br>`);
            document.write(`dzielenie= ${dzielenie.toFixed(2)}<br>`);
        }
        szpont();
    </script>
</body>

</html>
